<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Буква Ї</title>
<style>
:root{--bg:#f0f8ff;--text:#2c3e50;}
*{box-sizing:border-box;} html,body{margin:0;height:100%;}
body{font-family:Arial,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
.title{font-size:clamp(18px,2.6vw,28px);font-weight:800;text-align:center;padding:10px 56px;}
.stage{flex:1;display:flex;align-items:center;justify-content:center;padding:0 10px 12px;min-height:0;}
video{max-width:100%;max-height:100%;border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.18);background:#000;}
#btn-fs{position:fixed;top:12px;right:12px;z-index:9;background:#2c3e50;color:#fff;border:0;width:44px;height:44px;border-radius:10px;font-size:1.3rem;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.3);}
</style>
</head>
<body>
<button id="btn-fs" title="На весь екран" onclick="(function(){if(!document.fullscreenElement){document.documentElement.requestFullscreen();document.getElementById('btn-fs').textContent='✕';}else{document.exitFullscreen();document.getElementById('btn-fs').textContent='⛛';}})()">⛛</button>
<div class="title">Буква Ї</div>
<div class="stage">
  <video src="video.mp4" controls playsinline preload="metadata"></video>
</div>
</body>
</html>
